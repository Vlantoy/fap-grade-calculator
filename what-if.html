<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Tính điểm FAP — OCR</title>
  <meta name="theme-color" content="#0b1f3a" />
  <meta name="description" content="Chọn ảnh bảng điểm My FAP → tự đọc → sửa điểm bằng bánh xe → Average." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="assets/favicon-32.png" />
  <style>
    :root {
      --navy: #0b1f3a;
      --bg: #eef2f7;
      --card: #fff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #2563eb;
      --green: #16a34a;
      --danger: #dc2626;
      --item-h: 48px;
      --wheel-h: 192px;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
    }
    a { color: var(--blue); text-decoration: none; }

    .top {
      position: sticky; top: 0; z-index: 30;
      background: var(--navy); color: #fff;
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px;
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
    }
    .top a {
      color: #fff; width: 40px; height: 40px;
      display: grid; place-items: center; font-size: 1.3rem;
      border-radius: 10px;
    }
    .top h1 {
      flex: 1; margin: 0; text-align: center;
      font-size: 1.05rem; font-weight: 700;
      padding-right: 40px;
    }

    .page {
      width: min(480px, 100%);
      margin: 0 auto;
      padding: 16px 14px calc(20px + var(--safe-b));
    }

    /* STEP 1 — one big action */
    .hero {
      background: var(--card);
      border-radius: 20px;
      padding: 28px 18px 22px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(15, 23, 42, .08);
      border: 1px solid var(--border);
    }
    .hero .emoji { font-size: 2.5rem; line-height: 1; margin-bottom: 10px; }
    .hero h2 {
      margin: 0 0 8px; font-size: 1.2rem; font-weight: 800;
    }
    .hero p {
      margin: 0 0 20px; color: var(--muted); font-size: 0.92rem; line-height: 1.45;
    }
    .btn-big {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%;
      border: 0;
      background: var(--navy);
      color: #fff;
      font: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 18px 16px;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(11, 31, 58, .25);
    }
    .btn-big:active { transform: scale(0.98); }
    .btn-big:disabled { opacity: .55; cursor: wait; }
    .btn-big.secondary {
      margin-top: 10px;
      background: #fff;
      color: var(--navy);
      border: 2px solid var(--navy);
      box-shadow: none;
      padding: 14px 16px;
      font-size: 0.95rem;
    }

    .status {
      margin-top: 14px;
      font-size: 0.9rem;
      color: var(--muted);
      min-height: 1.4em;
    }
    .status.ok { color: var(--green); font-weight: 700; }
    .status.err { color: var(--danger); font-weight: 700; }
    .status.wait { color: var(--blue); font-weight: 600; }

    .bar {
      margin-top: 12px; height: 8px; border-radius: 99px;
      background: #e2e8f0; overflow: hidden; display: none;
    }
    .bar.on { display: block; }
    .bar > i {
      display: block; height: 100%; width: 0;
      background: linear-gradient(90deg, #2563eb, #22c55e);
      transition: width .2s;
    }

    .thumb {
      display: none;
      margin-top: 14px;
      border-radius: 12px;
      max-width: 100%;
      max-height: 140px;
      object-fit: contain;
      border: 1px solid var(--border);
      background: #f8fafc;
    }
    .thumb.on { display: inline-block; }

    /* STEP 2 — results */
    .panel { display: none; margin-top: 16px; }
    .panel.on { display: block; }

    .avg-sticky {
      position: sticky; top: 56px; z-index: 20;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 6px 20px rgba(15, 23, 42, .08);
    }
    .avg-sticky .l { font-size: 0.8rem; color: var(--muted); font-weight: 600; }
    .avg-sticky .n {
      font-size: 2rem; font-weight: 800; color: var(--green);
      font-variant-numeric: tabular-nums; line-height: 1;
    }
    .avg-sticky .tag {
      background: #eff6ff; color: #1d4ed8;
      font-weight: 800; padding: 6px 12px; border-radius: 999px;
    }

    .tip {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.86rem;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .list {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 12px;
      padding: 14px 14px;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .row:last-child { border-bottom: 0; }
    .row.total {
      background: #f8fafc;
      opacity: .75;
    }
    .row .name {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .row .meta {
      grid-column: 1;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .row .tap {
      grid-row: 1 / span 2;
      grid-column: 2;
      min-width: 72px;
      min-height: 48px;
      border: 2px solid #93c5fd;
      background: #eff6ff;
      border-radius: 14px;
      font: inherit;
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--navy);
      font-variant-numeric: tabular-nums;
      cursor: pointer;
    }
    .row .tap.empty {
      color: #64748b;
      font-size: 0.85rem;
      font-weight: 700;
      border-style: dashed;
      border-color: #cbd5e1;
      background: #f8fafc;
    }
    .row .tap:active { transform: scale(0.97); }
    .row.total .tap { display: none; }

    .actions {
      display: flex; gap: 8px; margin-top: 12px;
    }
    .actions button {
      flex: 1;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .foot {
      text-align: center;
      margin-top: 18px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* sheet */
    .mask {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(15,23,42,.5);
      opacity: 0; pointer-events: none; transition: .2s;
    }
    .mask.on { opacity: 1; pointer-events: auto; }
    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 110;
      background: #fff;
      border-radius: 20px 20px 0 0;
      transform: translateY(110%);
      transition: transform .25s ease;
      padding-bottom: var(--safe-b);
    }
    .sheet.on { transform: translateY(0); }
    .sheet .hd {
      text-align: center;
      padding: 16px 16px 4px;
      font-weight: 800;
      font-size: 1rem;
    }
    .sheet .sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 0 16px 4px;
    }
    .sheet .big {
      text-align: center;
      font-size: 2.4rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      padding: 4px 0 8px;
    }
    .wheels {
      display: flex; justify-content: center; align-items: stretch;
      gap: 6px; padding: 0 20px 12px; position: relative; height: var(--wheel-h);
    }
    .sel {
      position: absolute; left: 18%; right: 18%; top: 50%;
      height: var(--item-h); margin-top: calc(var(--item-h) / -2);
      border-radius: 14px;
      background: rgba(37,99,235,.1);
      border: 2px solid rgba(37,99,235,.35);
      pointer-events: none;
    }
    .col {
      width: 80px; height: var(--wheel-h);
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      mask-image: linear-gradient(#0000, #000 20%, #000 80%, #0000);
    }
    .col::-webkit-scrollbar { display: none; }
    .dot {
      width: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 800; color: #94a3b8;
    }
    .it {
      height: var(--item-h);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 700; color: #94a3b8;
      scroll-snap-align: center;
    }
    .pad { height: calc((var(--wheel-h) - var(--item-h)) / 2); }
    .sheet .btns {
      display: flex; gap: 10px;
      padding: 8px 16px 16px;
    }
    .sheet .btns button {
      flex: 1; border: 0; border-radius: 14px;
      padding: 16px; font: inherit; font-weight: 800; font-size: 1rem;
      cursor: pointer;
    }
    .sheet .ok { background: var(--navy); color: #fff; }
    .sheet .clear { background: #f1f5f9; color: var(--muted); }
  </style>
</head>
<body>
  <header class="top">
    <a href="index.html" aria-label="Back">←</a>
    <h1>Tính điểm FAP</h1>
  </header>

  <main class="page">
    <!-- ONE primary action -->
    <section class="hero" id="hero">
      <div class="emoji">📸</div>
      <h2>Chọn ảnh bảng điểm</h2>
      <p>
        Vào My FAP → Mark Details → chụp màn hình hoặc chọn ảnh đã lưu.<br />
        Máy sẽ <strong>tự đọc</strong> các thành phần điểm.
      </p>
      <button type="button" class="btn-big" id="btnPick">
        Chọn / chụp ảnh
      </button>
      <input type="file" id="file" accept="image/*" hidden />
      <div class="status" id="status"></div>
      <div class="bar" id="bar"><i id="barFill"></i></div>
      <img class="thumb" id="thumb" alt="" />
    </section>

    <section class="panel" id="panel">
      <div class="avg-sticky">
        <div>
          <div class="l">Average (what-if)</div>
          <div class="n" id="avg">0.0</div>
        </div>
        <div class="tag" id="letter">—</div>
      </div>

      <div class="tip">Chạm ô xanh bên phải để nhập / sửa điểm (kéo bánh xe).</div>

      <div class="list" id="list"></div>

      <div class="actions">
        <button type="button" id="btnAgain">Ảnh khác</button>
        <button type="button" id="btnClear">Xóa hết điểm</button>
      </div>
    </section>

    <p class="foot">
      Ảnh xử lý trên máy bạn · không gửi server ·
      <a href="index.html">Trang chủ</a>
    </p>
  </main>

  <div class="mask" id="mask"></div>
  <div class="sheet" id="sheet">
    <div class="hd" id="sheetTitle">Nhập điểm</div>
    <div class="sub" id="sheetSub"></div>
    <div class="big" id="sheetBig">0.0</div>
    <div class="wheels">
      <div class="sel"></div>
      <div class="col" id="wInt"></div>
      <div class="dot">.</div>
      <div class="col" id="wDec"></div>
    </div>
    <div class="btns">
      <button type="button" class="clear" id="btnEmpty">Trống</button>
      <button type="button" class="ok" id="btnOk">Xong</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
(function () {
  'use strict';

  var RESIT_RE = /\bresit\b|thi\s*l[aạ]i|retake/i;
  var HEADER_RE = /grade\s*category|grade\s*item|^weight$|^value$|mark\s*details|comment/i;
  var SKIP_RE = /course\s*total|status|studying|^average$|copyright|fpt university/i;
  var CAT_HINT = /assignment|progress|practical|final|quiz|lab|midterm|project|resit|fe\b|pe\b|workshop|attendance/i;
  var ITEM_H = 48;

  var rows = [];
  var editId = null;
  var timers = { i: null, d: null };

  function uid() { return 'r' + Math.random().toString(36).slice(2, 9); }
  function isResit(s) { return RESIT_RE.test(s || ''); }
  function baseKey(n) {
    return String(n || '').toLowerCase().replace(RESIT_RE, ' ').replace(/[:\-_|]/g, ' ').replace(/\s+/g, ' ').trim();
  }
  function clamp(v) {
    if (v == null || !isFinite(v)) return null;
    return Math.min(10, Math.max(0, Math.round(v * 10) / 10));
  }
  function letter(m) {
    if (m == null || !isFinite(m)) return '—';
    if (m >= 9) return 'A+';
    if (m >= 8.5) return 'A';
    if (m >= 8) return 'B+';
    if (m >= 7) return 'B';
    if (m >= 6.5) return 'C+';
    if (m >= 5.5) return 'C';
    if (m >= 5) return 'D+';
    if (m >= 4) return 'D';
    return 'F';
  }
  function fmt(v) {
    return v == null ? '' : (Math.round(v * 10) / 10).toFixed(1);
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scorable() {
    return rows.filter(function (r) {
      return !r.isTotal && r.weight > 0 && !/^average$/i.test(r.item);
    });
  }

  function avg() {
    var c = scorable();
    var on = {};
    c.forEach(function (x) {
      if (isResit(x.item) && x.value != null) on[baseKey(x.item)] = true;
    });
    var s = 0;
    c.forEach(function (x) {
      if (isResit(x.item)) {
        if (x.value == null) return;
        s += (x.value * x.weight) / 100;
        return;
      }
      if (on[baseKey(x.item)]) return;
      s += ((x.value == null ? 0 : x.value) * x.weight) / 100;
    });
    return Math.round(s * 100) / 100;
  }

  /* ---- OCR parse ---- */
  function clean(t) {
    return String(t || '')
      .replace(/\u00a0/g, ' ')
      .replace(/[|¦]/g, ' ')
      .replace(/(\d)\s*[oO]\s*%/g, '$1.0 %')
      .replace(/(\d)[, ](\d)\s*%/g, '$1.$2 %');
  }

  function parseText(raw) {
    var text = clean(raw);
    var lines = text.split(/\r?\n/).map(function (l) {
      return l.replace(/\s+/g, ' ').trim();
    }).filter(Boolean);

    var WRE = /(\d{1,2}(?:[.,]\d+)?)\s*%/g;
    var found = [];
    var lastCat = '';

    for (var li = 0; li < lines.length; li++) {
      var line = lines[li];
      if (HEADER_RE.test(line) && !WRE.test(line)) continue;
      if (SKIP_RE.test(line) && !/resit/i.test(line)) continue;

      WRE.lastIndex = 0;
      var wm = WRE.exec(line);
      if (!wm) {
        if (CAT_HINT.test(line) && line.length < 42 && !/\d{2}/.test(line)) lastCat = line;
        continue;
      }
      var weight = parseFloat(wm[1].replace(',', '.'));
      if (!(weight > 0 && weight <= 100)) continue;

      var before = line.slice(0, wm.index).trim();
      var after = line.slice(wm.index + wm[0].length).trim();
      var value = null;
      var vm = after.match(/^(\d{1,2}(?:[.,]\d+)?)\b/);
      if (vm) {
        var vv = parseFloat(vm[1].replace(',', '.'));
        if (vv >= 0 && vv <= 10) value = clamp(vv);
      }

      var item = before.replace(/^[\-·•\d.)\s]+/, '').trim();
      var category = lastCat;
      var cm = item.match(/^(Assignment|Progress\s*test|Practical\s*Exam|Final\s*Exam(?:\s*Resit)?|Lab|Quiz|Project)\b/i);
      if (cm) {
        category = cm[0];
        lastCat = category;
      }
      if (!item && li > 0) {
        var p = lines[li - 1];
        if (p && !/(\d)\s*%/.test(p) && !HEADER_RE.test(p) && !SKIP_RE.test(p)) item = p;
      }
      item = (item || 'Component').replace(/\s+/g, ' ');
      if (/^average$/i.test(item)) continue;
      var isTotal = /^total$/i.test(item);
      found.push({
        id: uid(),
        category: category || '',
        item: item,
        weight: weight,
        value: isTotal ? null : value,
        isTotal: isTotal,
      });
    }

    if (found.length < 2) {
      var re = /([A-Za-z][A-Za-z0-9:.\s\-_]{1,40}?)\s+(\d{1,2}(?:[.,]\d+)?)\s*%(?:\s+(\d{1,2}(?:[.,]\d+)?))?/g;
      var t = clean(raw).replace(/\n/g, ' ');
      var m;
      found = [];
      while ((m = re.exec(t))) {
        var it = m[1].replace(/\s+/g, ' ').trim();
        if (HEADER_RE.test(it) || it.length < 2) continue;
        var w = parseFloat(m[2].replace(',', '.'));
        if (!(w > 0 && w <= 100)) continue;
        var val = null;
        if (m[3] != null) {
          var x = parseFloat(m[3].replace(',', '.'));
          if (x >= 0 && x <= 10) val = clamp(x);
        }
        found.push({
          id: uid(),
          category: '',
          item: it,
          weight: w,
          value: /^total$/i.test(it) ? null : val,
          isTotal: /^total$/i.test(it),
        });
      }
    }

    var cat = '';
    found.forEach(function (r) {
      if (r.category) cat = r.category;
      else r.category = cat;
    });
    return found.filter(function (r) {
      return !HEADER_RE.test(r.item);
    });
  }

  /* ---- UI ---- */
  function setStatus(msg, kind) {
    var el = document.getElementById('status');
    el.textContent = msg || '';
    el.className = 'status' + (kind ? ' ' + kind : '');
  }
  function setBar(p) {
    var bar = document.getElementById('bar');
    var fill = document.getElementById('barFill');
    if (p == null) {
      bar.classList.remove('on');
      fill.style.width = '0%';
      return;
    }
    bar.classList.add('on');
    fill.style.width = Math.round(Math.min(100, Math.max(0, p))) + '%';
  }

  function render() {
    var panel = document.getElementById('panel');
    var list = document.getElementById('list');
    if (!rows.length) {
      panel.classList.remove('on');
      return;
    }
    panel.classList.add('on');
    var a = avg();
    document.getElementById('avg').textContent = a.toFixed(1);
    document.getElementById('letter').textContent = letter(a);

    var html = '';
    rows.forEach(function (r) {
      if (r.isTotal) {
        html +=
          '<div class="row total"><div class="name">' +
          esc(r.item) +
          '</div><div class="meta">' +
          (r.category ? esc(r.category) + ' · ' : '') +
          r.weight.toFixed(0) +
          '%</div></div>';
        return;
      }
      var has = r.value != null;
      html +=
        '<div class="row">' +
        '<div class="name">' +
        esc(r.item) +
        '</div>' +
        '<div class="meta">' +
        (r.category ? esc(r.category) + ' · ' : '') +
        'Weight ' +
        r.weight.toFixed(1) +
        '%</div>' +
        '<button type="button" class="tap' +
        (has ? '' : ' empty') +
        '" data-id="' +
        r.id +
        '">' +
        (has ? fmt(r.value) : 'Nhập') +
        '</button></div>';
    });
    list.innerHTML = html;
  }

  function prepImage(file) {
    return new Promise(function (resolve) {
      var url = URL.createObjectURL(file);
      var img = new Image();
      img.onload = function () {
        try {
          var maxW = 1400;
          var scale = img.width > maxW ? maxW / img.width : img.width < 800 ? Math.min(2, 1000 / img.width) : 1;
          var w = Math.round(img.width * scale);
          var h = Math.round(img.height * scale);
          var c = document.createElement('canvas');
          c.width = w;
          c.height = h;
          var ctx = c.getContext('2d');
          ctx.fillStyle = '#fff';
          ctx.fillRect(0, 0, w, h);
          ctx.drawImage(img, 0, 0, w, h);
          var id = ctx.getImageData(0, 0, w, h);
          var d = id.data;
          for (var i = 0; i < d.length; i += 4) {
            var g = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
            g = (g - 128) * 1.3 + 128;
            if (g < 0) g = 0;
            if (g > 255) g = 255;
            d[i] = d[i + 1] = d[i + 2] = g;
          }
          ctx.putImageData(id, 0, 0);
          URL.revokeObjectURL(url);
          c.toBlob(function (b) {
            resolve(b || file);
          }, 'image/png');
        } catch (e) {
          URL.revokeObjectURL(url);
          resolve(file);
        }
      };
      img.onerror = function () {
        URL.revokeObjectURL(url);
        resolve(file);
      };
      img.src = url;
    });
  }

  async function runOcr(file) {
    var btn = document.getElementById('btnPick');
    btn.disabled = true;
    var thumb = document.getElementById('thumb');
    thumb.src = URL.createObjectURL(file);
    thumb.classList.add('on');
    setStatus('Đang đọc ảnh…', 'wait');
    setBar(8);

    if (!window.Tesseract) {
      setStatus('Không tải được OCR. Cần mạng lần đầu.', 'err');
      btn.disabled = false;
      setBar(null);
      return;
    }

    var blob = await prepImage(file);
    try {
      var result = await Tesseract.recognize(blob, 'eng', {
        logger: function (m) {
          if (m.status === 'recognizing text' && m.progress != null) {
            setBar(10 + m.progress * 85);
            setStatus('Đang đọc… ' + Math.round(m.progress * 100) + '%', 'wait');
          }
        },
      });
      var text = (result && result.data && result.data.text) || '';
      var parsed = parseText(text);
      if (!parsed.length) {
        setStatus('Chưa đọc được bảng. Thử ảnh rõ hơn, đủ cột Weight (10.0 %).', 'err');
        setBar(null);
        btn.disabled = false;
        return;
      }
      rows = parsed;
      setBar(100);
      setStatus('Xong — ' + scorable().length + ' thành phần. Chạm 「Nhập」 để gõ điểm.', 'ok');
      render();
      document.getElementById('panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (e) {
      console.error(e);
      setStatus('Lỗi OCR. Thử ảnh khác.', 'err');
      setBar(null);
    }
    btn.disabled = false;
  }

  /* ---- wheel ---- */
  function buildCol(el, max) {
    var h = '<div class="pad"></div>';
    for (var i = 0; i <= max; i++) h += '<div class="it" data-v="' + i + '">' + i + '</div>';
    h += '<div class="pad"></div>';
    el.innerHTML = h;
  }
  function scrollTo(el, v, smooth) {
    var it = el.querySelector('.it[data-v="' + v + '"]');
    if (!it) return;
    var top = it.offsetTop - (el.clientHeight - it.clientHeight) / 2;
    el.scrollTo({ top: top, behavior: smooth ? 'smooth' : 'auto' });
  }
  function readCol(el) {
    var items = el.querySelectorAll('.it');
    var mid = el.scrollTop + el.clientHeight / 2;
    var best = 0, dist = 1e9;
    for (var i = 0; i < items.length; i++) {
      var c = items[i].offsetTop + items[i].clientHeight / 2;
      var d = Math.abs(c - mid);
      if (d < dist) {
        dist = d;
        best = parseInt(items[i].getAttribute('data-v'), 10);
      }
    }
    return best;
  }
  function preview() {
    var i = readCol(document.getElementById('wInt'));
    var d = readCol(document.getElementById('wDec'));
    if (i >= 10) d = 0;
    var v = i >= 10 ? 10 : i + d / 10;
    document.getElementById('sheetBig').textContent = v.toFixed(1);
  }
  function openPick(id) {
    var row = null;
    for (var i = 0; i < rows.length; i++) if (rows[i].id === id) row = rows[i];
    if (!row || row.isTotal) return;
    editId = id;
    document.getElementById('sheetSub').textContent =
      row.item + ' · ' + row.weight + '%';
    var wi = document.getElementById('wInt');
    var wd = document.getElementById('wDec');
    buildCol(wi, 10);
    buildCol(wd, 9);
    var v = row.value != null ? row.value : 0;
    var ip = Math.min(10, Math.floor(v + 1e-9));
    var dp = Math.round((v - ip) * 10);
    if (ip >= 10) {
      ip = 10;
      dp = 0;
    }
    document.getElementById('mask').classList.add('on');
    document.getElementById('sheet').classList.add('on');
    requestAnimationFrame(function () {
      scrollTo(wi, ip, false);
      scrollTo(wd, dp, false);
      preview();
    });
  }
  function closePick() {
    document.getElementById('mask').classList.remove('on');
    document.getElementById('sheet').classList.remove('on');
    editId = null;
  }
  function apply(clear) {
    if (!editId) return;
    var row = null;
    for (var i = 0; i < rows.length; i++) if (rows[i].id === editId) row = rows[i];
    if (!row) return;
    if (clear) row.value = null;
    else {
      var i = readCol(document.getElementById('wInt'));
      var d = readCol(document.getElementById('wDec'));
      row.value = i >= 10 ? 10 : clamp(i + d / 10);
    }
    closePick();
    render();
  }

  /* events — one button */
  document.getElementById('btnPick').addEventListener('click', function () {
    document.getElementById('file').click();
  });
  document.getElementById('file').addEventListener('change', function (e) {
    var f = e.target.files && e.target.files[0];
    e.target.value = '';
    if (f) runOcr(f);
  });
  document.getElementById('btnAgain').addEventListener('click', function () {
    document.getElementById('file').click();
  });
  document.getElementById('btnClear').addEventListener('click', function () {
    rows.forEach(function (r) {
      if (!r.isTotal) r.value = null;
    });
    render();
  });
  document.getElementById('list').addEventListener('click', function (e) {
    var b = e.target.closest('[data-id]');
    if (b) openPick(b.getAttribute('data-id'));
  });
  document.getElementById('mask').addEventListener('click', closePick);
  document.getElementById('btnOk').addEventListener('click', function () {
    apply(false);
  });
  document.getElementById('btnEmpty').addEventListener('click', function () {
    apply(true);
  });

  function bindScroll(el, key) {
    el.addEventListener(
      'scroll',
      function () {
        preview();
        clearTimeout(timers[key]);
        timers[key] = setTimeout(function () {
          var v = readCol(el);
          scrollTo(el, v, true);
          if (key === 'i' && v >= 10) scrollTo(document.getElementById('wDec'), 0, true);
          preview();
        }, 90);
      },
      { passive: true }
    );
  }
  bindScroll(document.getElementById('wInt'), 'i');
  bindScroll(document.getElementById('wDec'), 'd');

  document.addEventListener('paste', function (e) {
    var items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.indexOf('image') === 0) {
        var f = items[i].getAsFile();
        if (f) {
          e.preventDefault();
          runOcr(f);
        }
        break;
      }
    }
  });
})();
  </script>
</body>
