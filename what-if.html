<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Tính điểm FAP — OCR</title>
  <meta name="theme-color" content="#0b1f3a" />
  <meta name="description" content="Chọn ảnh bảng điểm My FAP → tự đọc → sửa điểm bằng bánh xe → Average." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="assets/favicon-32.png" />
  <style>
    :root {
      --navy: #0b1f3a;
      --bg: #eef2f7;
      --card: #fff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #2563eb;
      --green: #16a34a;
      --danger: #dc2626;
      --item-h: 48px;
      --wheel-h: 192px;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
    }
    a { color: var(--blue); text-decoration: none; }

    .top {
      position: sticky; top: 0; z-index: 30;
      background: var(--navy); color: #fff;
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px;
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
    }
    .top a {
      color: #fff; width: 40px; height: 40px;
      display: grid; place-items: center; font-size: 1.3rem;
      border-radius: 10px;
    }
    .top h1 {
      flex: 1; margin: 0; text-align: center;
      font-size: 1.05rem; font-weight: 700;
      padding-right: 40px;
    }

    .page {
      width: min(480px, 100%);
      margin: 0 auto;
      padding: 16px 14px calc(20px + var(--safe-b));
    }

    /* STEP 1 — one big action */
    .hero {
      background: var(--card);
      border-radius: 20px;
      padding: 28px 18px 22px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(15, 23, 42, .08);
      border: 1px solid var(--border);
    }
    .hero .emoji { font-size: 2.5rem; line-height: 1; margin-bottom: 10px; }
    .hero h2 {
      margin: 0 0 8px; font-size: 1.2rem; font-weight: 800;
    }
    .hero p {
      margin: 0 0 20px; color: var(--muted); font-size: 0.92rem; line-height: 1.45;
    }
    .btn-big {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%;
      border: 0;
      background: var(--navy);
      color: #fff;
      font: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 18px 16px;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(11, 31, 58, .25);
    }
    .btn-big:active { transform: scale(0.98); }
    .btn-big:disabled { opacity: .55; cursor: wait; }
    .btn-big.secondary {
      margin-top: 10px;
      background: #fff;
      color: var(--navy);
      border: 2px solid var(--navy);
      box-shadow: none;
      padding: 14px 16px;
      font-size: 0.95rem;
    }

    .status {
      margin-top: 14px;
      font-size: 0.9rem;
      color: var(--muted);
      min-height: 1.4em;
    }
    .status.ok { color: var(--green); font-weight: 700; }
    .status.err { color: var(--danger); font-weight: 700; }
    .status.wait { color: var(--blue); font-weight: 600; }

    .bar {
      margin-top: 12px; height: 8px; border-radius: 99px;
      background: #e2e8f0; overflow: hidden; display: none;
    }
    .bar.on { display: block; }
    .bar > i {
      display: block; height: 100%; width: 0;
      background: linear-gradient(90deg, #2563eb, #22c55e);
      transition: width .2s;
    }

    .thumb {
      display: none;
      margin-top: 14px;
      border-radius: 12px;
      max-width: 100%;
      max-height: 140px;
      object-fit: contain;
      border: 1px solid var(--border);
      background: #f8fafc;
    }
    .thumb.on { display: inline-block; }

    /* STEP 2 — results */
    .panel { display: none; margin-top: 16px; }
    .panel.on { display: block; }

    .avg-sticky {
      position: sticky; top: 56px; z-index: 20;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 6px 20px rgba(15, 23, 42, .08);
    }
    .avg-sticky .l { font-size: 0.8rem; color: var(--muted); font-weight: 600; }
    .avg-sticky .n {
      font-size: 2rem; font-weight: 800; color: var(--green);
      font-variant-numeric: tabular-nums; line-height: 1;
    }
    .avg-sticky .tag {
      background: #eff6ff; color: #1d4ed8;
      font-weight: 800; padding: 6px 12px; border-radius: 999px;
    }

    .tip {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.86rem;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .list {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 12px;
      padding: 14px 14px;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .row:last-child { border-bottom: 0; }
    .row.total {
      background: #f8fafc;
      opacity: .75;
    }
    .row .name {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .row .meta {
      grid-column: 1;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .row .tap {
      grid-row: 1 / span 2;
      grid-column: 2;
      min-width: 72px;
      min-height: 48px;
      border: 2px solid #93c5fd;
      background: #eff6ff;
      border-radius: 14px;
      font: inherit;
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--navy);
      font-variant-numeric: tabular-nums;
      cursor: pointer;
    }
    .row .tap.empty {
      color: #64748b;
      font-size: 0.85rem;
      font-weight: 700;
      border-style: dashed;
      border-color: #cbd5e1;
      background: #f8fafc;
    }
    .row .tap:active { transform: scale(0.97); }
    .row.total .tap { display: none; }

    .actions {
      display: flex; gap: 8px; margin-top: 12px;
    }
    .actions button {
      flex: 1;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .foot {
      text-align: center;
      margin-top: 18px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* sheet */
    .mask {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(15,23,42,.5);
      opacity: 0; pointer-events: none; transition: .2s;
    }
    .mask.on { opacity: 1; pointer-events: auto; }
    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 110;
      background: #fff;
      border-radius: 20px 20px 0 0;
      transform: translateY(110%);
      transition: transform .25s ease;
      padding-bottom: var(--safe-b);
    }
    .sheet.on { transform: translateY(0); }
    .sheet .hd {
      text-align: center;
      padding: 16px 16px 4px;
      font-weight: 800;
      font-size: 1rem;
    }
    .sheet .sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 0 16px 4px;
    }
    .sheet .big {
      text-align: center;
      font-size: 2.4rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      padding: 4px 0 8px;
    }
    .wheels {
      display: flex; justify-content: center; align-items: stretch;
      gap: 6px; padding: 0 20px 12px; position: relative; height: var(--wheel-h);
    }
    .sel {
      position: absolute; left: 18%; right: 18%; top: 50%;
      height: var(--item-h); margin-top: calc(var(--item-h) / -2);
      border-radius: 14px;
      background: rgba(37,99,235,.1);
      border: 2px solid rgba(37,99,235,.35);
      pointer-events: none;
    }
    .col {
      width: 80px; height: var(--wheel-h);
      overflow-y: auto;
      /* Browser snaps; JS không smooth-scroll lại (tránh vòng lặp) */
      scroll-snap-type: y mandatory;
      scroll-behavior: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-width: none;
      mask-image: linear-gradient(#0000, #000 20%, #000 80%, #0000);
    }
    .col::-webkit-scrollbar { display: none; }
    .dot {
      width: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 800; color: #94a3b8;
    }
    .it {
      height: var(--item-h);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 700; color: #94a3b8;
      scroll-snap-align: center;
      scroll-snap-stop: always;
      flex-shrink: 0;
    }
    .pad {
      height: calc((var(--wheel-h) - var(--item-h)) / 2);
      flex-shrink: 0;
      scroll-snap-align: none;
    }
    .sheet .btns {
      display: flex; gap: 10px;
      padding: 8px 16px 16px;
    }
    .sheet .btns button {
      flex: 1; border: 0; border-radius: 14px;
      padding: 16px; font: inherit; font-weight: 800; font-size: 1rem;
      cursor: pointer;
    }
    .sheet .ok { background: var(--navy); color: #fff; }
    .sheet .clear { background: #f1f5f9; color: var(--muted); }
  </style>
</head>
<body>
  <header class="top">
    <a href="index.html" aria-label="Back">←</a>
    <h1>Tính điểm FAP</h1>
  </header>

  <main class="page">
    <!-- ONE primary action -->
    <section class="hero" id="hero">
      <div class="emoji">📸</div>
      <h2>Chọn ảnh bảng điểm</h2>
      <p>
        My FAP → Mark Details → chọn ảnh.<br />
        Đọc <strong>Grade item</strong> + <strong>Weight</strong> + <strong>Value</strong> (điểm đã có). Chạm ô để sửa what-if.
      </p>
      <button type="button" class="btn-big" id="btnPick">
        Chọn / chụp ảnh
      </button>
      <input type="file" id="file" accept="image/*" hidden />
      <div class="status" id="status"></div>
      <div class="bar" id="bar"><i id="barFill"></i></div>
      <img class="thumb" id="thumb" alt="" />
    </section>

    <section class="panel" id="panel">
      <div class="avg-sticky">
        <div>
          <div class="l">Average (what-if)</div>
          <div class="n" id="avg">0.0</div>
        </div>
        <div class="tag" id="letter">—</div>
      </div>

      <div class="tip">Chạm ô xanh bên phải để nhập / sửa điểm (kéo bánh xe).</div>

      <div class="list" id="list"></div>

      <div class="actions">
        <button type="button" id="btnAgain">Ảnh khác</button>
        <button type="button" id="btnClear">Xóa hết điểm</button>
      </div>
    </section>

    <p class="foot">
      Ảnh xử lý trên máy bạn · không gửi server ·
      <a href="index.html">Trang chủ</a>
    </p>
  </main>

  <div class="mask" id="mask"></div>
  <div class="sheet" id="sheet">
    <div class="hd" id="sheetTitle">Nhập điểm</div>
    <div class="sub" id="sheetSub"></div>
    <div class="big" id="sheetBig">0.0</div>
    <div class="wheels">
      <div class="sel"></div>
      <div class="col" id="wInt"></div>
      <div class="dot">.</div>
      <div class="col" id="wDec"></div>
    </div>
    <div class="btns">
      <button type="button" class="clear" id="btnEmpty">Trống</button>
      <button type="button" class="ok" id="btnOk">Xong</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
(function () {
  'use strict';

  // OCR: vie+eng (Tesseract.js) — vie hỗ trợ dấu tiếng Việt tốt hơn eng-only
  var OCR_LANG = 'vie+eng';
  var ocrWorker = null;
  var ocrWorkerReady = null;

  var RESIT_RE = /\bresit\b|thi\s*l[aạ]i|retake|h[oọ]c\s*l[aạ]i/i;
  var HEADER_RE =
    /grade\s*category|grade\s*item|^weight$|^value$|mark\s*details|comment|th[aà]nh\s*ph[aầ]n|tr[oọ]ng\s*s[oố]|gi[aá]\s*tr[iị]|t[eê]n\s*m[oô]n|đi[eể]m/i;
  var SKIP_RE =
    /course\s*total|status|studying|^average$|copyright|fpt university|t[oổ]ng\s*k[eế]t|tr[aạ]ng\s*th[aá]i|đang\s*h[oọ]c|đi[eể]m\s*trung\s*b[iì]nh/i;
  var CAT_HINT =
    /assignment|progress|practical|final|quiz|lab|midterm|project|resit|fe\b|pe\b|workshop|attendance|b[aà]i\s*t[aậ]p|ki[eể]m\s*tra|th[iị]\s*cu[oố]i|th[iị]\s*gi[uữ]a|th[ự]c\s*h[à]nh|l[yý]\s*thuy[eế]t|chuy[eê]n\s*c[aầ]n|đi[eể]m\s*danh|thuy[eế]t\s*tr[iì]nh/i;
  var ITEM_H = 48;

  var rows = [];
  var editId = null;
  /** true khi JS đang set scrollTop (mở picker) — bỏ qua handler scroll */
  var wheelProgrammatic = false;

  function uid() { return 'r' + Math.random().toString(36).slice(2, 9); }
  function isResit(s) { return RESIT_RE.test(s || ''); }
  function baseKey(n) {
    return String(n || '').toLowerCase().replace(RESIT_RE, ' ').replace(/[:\-_|]/g, ' ').replace(/\s+/g, ' ').trim();
  }
  function clamp(v) {
    if (v == null || !isFinite(v)) return null;
    return Math.min(10, Math.max(0, Math.round(v * 10) / 10));
  }
  function letter(m) {
    if (m == null || !isFinite(m)) return '—';
    if (m >= 9) return 'A+';
    if (m >= 8.5) return 'A';
    if (m >= 8) return 'B+';
    if (m >= 7) return 'B';
    if (m >= 6.5) return 'C+';
    if (m >= 5.5) return 'C';
    if (m >= 5) return 'D+';
    if (m >= 4) return 'D';
    return 'F';
  }
  function fmt(v) {
    return v == null ? '' : (Math.round(v * 10) / 10).toFixed(1);
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scorable() {
    return rows.filter(function (r) {
      return !r.isTotal && r.weight > 0 && !/^average$/i.test(r.item);
    });
  }

  function avg() {
    var c = scorable();
    var on = {};
    c.forEach(function (x) {
      if (isResit(x.item) && x.value != null) on[baseKey(x.item)] = true;
    });
    var s = 0;
    c.forEach(function (x) {
      if (isResit(x.item)) {
        if (x.value == null) return;
        s += (x.value * x.weight) / 100;
        return;
      }
      if (on[baseKey(x.item)]) return;
      s += ((x.value == null ? 0 : x.value) * x.weight) / 100;
    });
    return Math.round(s * 100) / 100;
  }

  /* ---- OCR: Grade item + Weight + Value ----
   * Mỗi dòng có "X.X %" →
   *   item  = chữ TRƯỚC %  (Grade item)
   *   weight = số %
   *   value  = số SAU % nếu 0–10 (cột Value), trống nếu không có
   */
  function clean(t) {
    return String(t || '')
      .replace(/\u00a0/g, ' ')
      .replace(/[|¦]/g, ' ')
      .replace(/[“”"']/g, '')
      .replace(/(\d)\s*[oO]\s*%/g, '$1.0%')
      .replace(/(\d)\s*[%％]/g, '$1%')
      .replace(/(\d)[.,](\d+)\s*[%％]/g, '$1.$2%')
      .replace(/(\d)\s+[.,]\s*(\d+)\s*[%％]/g, '$1.$2%')
      .replace(/[%％]/g, '%');
  }

  /** Sửa lỗi OCR thường gặp trên tên Grade item FAP */
  function fixItemName(s) {
    var t = String(s || '')
      .replace(/\s+/g, ' ')
      .trim();
    // ký tự lạ
    t = t.replace(/^[^\wÀ-ỹ(]+/i, '').replace(/[^\wÀ-ỹ).+\-\s]+$/i, '');
    // OCR nhầm chữ
    var reps = [
      [/Assiqnment|Assignrnent|Assiqment|Assiqmn?ent/gi, 'Assignment'],
      [/Proqress|Progres+|Proqres/gi, 'Progress'],
      [/Practica[lI1]|Practicai/gi, 'Practical'],
      [/Fina[lI1]/gi, 'Final'],
      [/Tota[lI1]/gi, 'Total'],
      [/Exarn|Exarnination|Exarn/gi, 'Exam'],
      [/Reslt|Resit|Resi t/gi, 'Resit'],
      [/Teory|Theor y/gi, 'Theory'],
      [/0ral/gi, 'Oral'],
      [/Quíz|Ouiz/gi, 'Quiz'],
      [/\bFE\s*:\s*/gi, 'FE: '],
      [/\bPE\s*:\s*/gi, 'PE: '],
    ];
    for (var i = 0; i < reps.length; i++) t = t.replace(reps[i][0], reps[i][1]);
    t = t.replace(/\s+/g, ' ').trim();

    // Map gần đúng → tên chuẩn FAP hay gặp
    var known = [
      'Assignment 1', 'Assignment 2', 'Assignment 3',
      'Progress test 1', 'Progress test 2', 'Progress test 3',
      'Progress Test 1', 'Progress Test 2', 'Progress Test 3',
      'Practical Exam', 'Theory Exam',
      'Final Exam', 'Final Exam Resit',
      'FE: Practical Exam', 'FE: Theory Exam',
      'FE: Practical Exam Resit', 'FE: Theory Exam Resit',
      'LAB', 'Lab', 'Quiz 1', 'Quiz 2',
      'Total',
    ];
    var low = t.toLowerCase().replace(/\s+/g, ' ');
    for (var k = 0; k < known.length; k++) {
      var kn = known[k].toLowerCase();
      if (low === kn || low.replace(/[^a-z0-9]/g, '') === kn.replace(/[^a-z0-9]/g, '')) {
        return known[k];
      }
      // fuzzy: contains same digits + main word
      if (low.length >= 4 && (low.indexOf(kn) >= 0 || kn.indexOf(low) >= 0)) {
        if (Math.abs(low.length - kn.length) <= 3) return known[k];
      }
    }
    return t;
  }

  function isJunkItem(item) {
    if (!item || item.length < 2) return true;
    if (HEADER_RE.test(item)) return true;
    if (SKIP_RE.test(item) && !/resit/i.test(item)) return true;
    if (/^[\d.%\s]+$/.test(item)) return true;
    if (/^(weight|value|item|category|%|w)$/i.test(item)) return true;
    return false;
  }

  /**
   * Parse chỉ quan tâm Grade item.
   * Pattern:  <grade item text>  <weight>%  [value]
   */
  function parseText(raw) {
    var text = clean(raw);
    // gộp dòng bị gãy: "Progress" \n "test 1 10.0%"
    var lines = text.split(/\r?\n/).map(function (l) {
      return l.replace(/\s+/g, ' ').trim();
    }).filter(Boolean);

    var merged = [];
    for (var i = 0; i < lines.length; i++) {
      var cur = lines[i];
      var hasPct = /\d+\s*%/.test(cur);
      if (!hasPct && i + 1 < lines.length && /\d+\s*%/.test(lines[i + 1])) {
        // dòng sau có % → dính item
        if (!HEADER_RE.test(cur) && !SKIP_RE.test(cur) && cur.length < 50) {
          merged.push((cur + ' ' + lines[i + 1]).replace(/\s+/g, ' ').trim());
          i++;
          continue;
        }
      }
      // "Assignment 1" alone then "10.0 %" alone
      if (!hasPct && i + 1 < lines.length && /^\d{1,2}(?:[.,]\d+)?\s*%/.test(lines[i + 1])) {
        merged.push((cur + ' ' + lines[i + 1]).replace(/\s+/g, ' ').trim());
        i++;
        continue;
      }
      merged.push(cur);
    }

    var found = [];
    var seen = {};

    for (var li = 0; li < merged.length; li++) {
      var line = merged[li];
      if (HEADER_RE.test(line) && !/\d+\s*%/.test(line)) continue;

      // mọi weight trên dòng
      var re = /(\d{1,2}(?:[.,]\d+)?)\s*%/g;
      var wm;
      var matches = [];
      while ((wm = re.exec(line))) {
        matches.push({ weight: parseFloat(wm[1].replace(',', '.')), index: wm.index, len: wm[0].length });
      }
      if (!matches.length) continue;

      // thường 1 weight / dòng component; nếu nhiều lấy cái đầu (tránh % lạ)
      var m0 = matches[0];
      if (!(m0.weight > 0 && m0.weight <= 100)) continue;

      var before = line.slice(0, m0.index).trim();
      var after = line.slice(m0.index + m0.len).trim();

      // bỏ category dính trước item: "Assignment Assignment 1" → "Assignment 1"
      before = before
        .replace(/^(Grade\s*category|Grade\s*item)\s+/i, '')
        .replace(
          /^(Assignment|Progress\s*test|Practical\s*Exam|Final\s*Exam(?:\s*Resit)?|Lab)\s+(?=\1|Assignment|Progress|Practical|Final|Lab|FE|PE|Quiz|Total|\d)/i,
          ''
        )
        .trim();

      var item = fixItemName(before);
      if (isJunkItem(item)) {
        var parts = before.split(/\s{2,}|·|\|/).map(function (x) { return x.trim(); }).filter(Boolean);
        if (parts.length) item = fixItemName(parts[parts.length - 1]);
      }
      if (isJunkItem(item)) continue;

      var isTotal = /^total$/i.test(item) || /^t[oổ]ng$/i.test(item);
      if (isTotal) item = 'Total';

      // VALUE cột: số 0–10 ngay sau weight (cùng dòng hoặc token kế)
      var value = isTotal ? null : parseValueAfterWeight(after, merged, li);

      // khử trùng: cùng item + weight
      var key = item.toLowerCase() + '|' + m0.weight;
      if (seen[key]) continue;
      seen[key] = true;

      found.push({
        id: uid(),
        category: '', // không cần category
        item: item,
        weight: m0.weight,
        value: isTotal ? null : value,
        isTotal: isTotal,
      });
    }

    // Fallback global: "ItemName 10.0% 8.3"
    if (found.length < 2) {
      found = [];
      seen = {};
      var gre =
        /([A-Za-zÀ-ỹ][A-Za-zÀ-ỹ0-9:.\s\-_]{1,48}?)\s+(\d{1,2}(?:[.,]\d+)?)\s*%(?:\s+(\d{1,2}(?:[.,]\d+)?))?/g;
      var flat = clean(raw).replace(/\n+/g, ' ');
      var gm;
      while ((gm = gre.exec(flat))) {
        var it2 = fixItemName(gm[1]);
        if (isJunkItem(it2)) continue;
        var w2 = parseFloat(gm[2].replace(',', '.'));
        if (!(w2 > 0 && w2 <= 100)) continue;
        var val2 = null;
        if (gm[3] != null) {
          var x2 = parseFloat(String(gm[3]).replace(',', '.'));
          if (x2 >= 0 && x2 <= 10) val2 = clamp(x2);
        }
        var isT = /^total$/i.test(it2);
        var key2 = it2.toLowerCase() + '|' + w2;
        if (seen[key2]) continue;
        seen[key2] = true;
        found.push({
          id: uid(),
          category: '',
          item: isT ? 'Total' : it2,
          weight: w2,
          value: isT ? null : val2,
          isTotal: isT,
        });
      }
    }

    return found;
  }

  /**
   * Lấy Value sau weight:
   *  "10.0% 8.3" | "10.0% 8,3" | "10.0% . 8.3" | dòng sau chỉ là "8.3"
   */
  function parseValueAfterWeight(after, lines, lineIndex) {
    var candidates = [];
    if (after) candidates.push(after);
    // dòng kế nếu trông như chỉ là điểm
    if (lines && lineIndex + 1 < lines.length) {
      var nxt = lines[lineIndex + 1];
      if (nxt && !/\d+\s*%/.test(nxt) && /^[\d\s.,\-]+$/.test(nxt) && nxt.length <= 8) {
        candidates.push(nxt);
      }
    }

    for (var c = 0; c < candidates.length; c++) {
      var s = String(candidates[c])
        .replace(/,/g, '.')
        .replace(/\s+/g, ' ')
        .trim();
      // bỏ % thừa / ký tự rác OCR
      s = s.replace(/^[%:.\-\s]+/, '');
      // "8.3" hoặc "8 . 3" hoặc "83" (hiếm, bỏ) hoặc "10"
      var m =
        s.match(/^(\d{1,2}[.,]\d)\b/) ||
        s.match(/^(\d{1,2})\s*[.,]\s*(\d)\b/) ||
        s.match(/^(\d{1,2})\b/);
      if (!m) continue;
      var num;
      if (m[2] != null) num = parseFloat(m[1] + '.' + m[2]);
      else num = parseFloat(String(m[1]).replace(',', '.'));
      if (!isFinite(num)) continue;
      // Value FAP: 0–10; loại weight 20/30/50 nhầm thành value
      if (num > 10) continue;
      // 20, 30 đứng sau % thường là weight dòng Total lặp — đã loại >10
      return clamp(num);
    }
    return null;
  }

  /* ---- UI ---- */
  function setStatus(msg, kind) {
    var el = document.getElementById('status');
    el.textContent = msg || '';
    el.className = 'status' + (kind ? ' ' + kind : '');
  }
  function setBar(p) {
    var bar = document.getElementById('bar');
    var fill = document.getElementById('barFill');
    if (p == null) {
      bar.classList.remove('on');
      fill.style.width = '0%';
      return;
    }
    bar.classList.add('on');
    fill.style.width = Math.round(Math.min(100, Math.max(0, p))) + '%';
  }

  function render() {
    var panel = document.getElementById('panel');
    var list = document.getElementById('list');
    if (!rows.length) {
      panel.classList.remove('on');
      return;
    }
    panel.classList.add('on');
    var a = avg();
    document.getElementById('avg').textContent = a.toFixed(1);
    document.getElementById('letter').textContent = letter(a);

    var html = '';
    rows.forEach(function (r) {
      if (r.isTotal) {
        html +=
          '<div class="row total"><div class="name">' +
          esc(r.item) +
          '</div><div class="meta">Weight ' +
          r.weight.toFixed(0) +
          '%</div></div>';
        return;
      }
      var has = r.value != null;
      html +=
        '<div class="row">' +
        '<div class="name">' +
        esc(r.item) +
        '</div>' +
        '<div class="meta">Weight ' +
        r.weight.toFixed(1) +
        '%</div>' +
        '<button type="button" class="tap' +
        (has ? '' : ' empty') +
        '" data-id="' +
        r.id +
        '">' +
        (has ? fmt(r.value) : 'Nhập') +
        '</button></div>';
    });
    list.innerHTML = html;
  }

  /**
   * Crop: Grade item + Weight + Value
   * (bỏ status bar / nav / bớt cột category trái — GIỮ cột Value phải)
   */
  function prepImage(file) {
    return new Promise(function (resolve) {
      var url = URL.createObjectURL(file);
      var img = new Image();
      img.onload = function () {
        try {
          var iw = img.width;
          var ih = img.height;
          // trái: bớt category; phải: giữ value; trên/dưới: bỏ chrome app
          var sx = Math.round(iw * 0.14);
          var sy = Math.round(ih * 0.09);
          var sw = Math.round(iw * 0.8); // item + weight + value
          var sh = Math.round(ih * 0.8);
          if (sw < 100 || sh < 100) {
            sx = 0;
            sy = 0;
            sw = iw;
            sh = ih;
          }

          var maxW = 1200;
          var scale = sw > maxW ? maxW / sw : sw < 700 ? Math.min(2.2, 900 / sw) : 1;
          var w = Math.round(sw * scale);
          var h = Math.round(sh * scale);
          var c = document.createElement('canvas');
          c.width = w;
          c.height = h;
          var ctx = c.getContext('2d');
          ctx.fillStyle = '#fff';
          ctx.fillRect(0, 0, w, h);
          ctx.drawImage(img, sx, sy, sw, sh, 0, 0, w, h);

          var id = ctx.getImageData(0, 0, w, h);
          var d = id.data;
          for (var i = 0; i < d.length; i += 4) {
            var g = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
            g = (g - 128) * 1.45 + 128;
            if (g < 0) g = 0;
            if (g > 255) g = 255;
            // hơi binary để chữ item rõ
            if (g > 175) g = 255;
            else if (g < 90) g = 0;
            d[i] = d[i + 1] = d[i + 2] = g;
          }
          ctx.putImageData(id, 0, 0);
          URL.revokeObjectURL(url);
          c.toBlob(function (b) {
            resolve(b || file);
          }, 'image/png');
        } catch (e) {
          URL.revokeObjectURL(url);
          resolve(file);
        }
      };
      img.onerror = function () {
        URL.revokeObjectURL(url);
        resolve(file);
      };
      img.src = url;
    });
  }

  /**
   * Worker vie+eng — tái dùng cho lần OCR sau (không tải model lại).
   * vie: dấu tiếng Việt; eng: header FAP (Weight, Assignment, …)
   */
  function getOcrWorker() {
    if (ocrWorkerReady) return ocrWorkerReady;
    if (!window.Tesseract || !Tesseract.createWorker) {
      ocrWorkerReady = Promise.reject(new Error('no-tesseract'));
      return ocrWorkerReady;
    }
    ocrWorkerReady = (async function () {
      setStatus('Đang tải OCR tiếng Việt + Anh (lần đầu ~ vài MB)…', 'wait');
      setBar(5);
      var worker = await Tesseract.createWorker(OCR_LANG, 1, {
        logger: function (m) {
          if (!m) return;
          if (m.status === 'loading language traineddata' && m.progress != null) {
            setBar(5 + m.progress * 25);
            setStatus('Tải model tiếng Việt… ' + Math.round(m.progress * 100) + '%', 'wait');
          } else if (m.status === 'initializing api') {
            setStatus('Khởi tạo OCR…', 'wait');
            setBar(32);
          } else if (m.status === 'recognizing text' && m.progress != null) {
            setBar(40 + m.progress * 55);
            setStatus('Đang đọc… ' + Math.round(m.progress * 100) + '%', 'wait');
          }
        },
      });
      // Ưu tiên layout theo dòng (bảng điểm)
      try {
        await worker.setParameters({
          // 4 = single column of text (gần cột Grade item)
          tessedit_pageseg_mode: '4',
          preserve_interword_spaces: '1',
        });
      } catch (e) {}
      ocrWorker = worker;
      return worker;
    })();
    return ocrWorkerReady;
  }

  async function runOcr(file) {
    var btn = document.getElementById('btnPick');
    btn.disabled = true;
    var thumb = document.getElementById('thumb');
    thumb.src = URL.createObjectURL(file);
    thumb.classList.add('on');
    setStatus('Đang chuẩn bị ảnh…', 'wait');
    setBar(4);

    if (!window.Tesseract) {
      setStatus('Không tải được OCR. Cần mạng (CDN) lần đầu.', 'err');
      btn.disabled = false;
      setBar(null);
      return;
    }

    var blob = await prepImage(file);
    try {
      var worker = await getOcrWorker();
      setStatus('Đang đọc (Việt + Anh)…', 'wait');
      var result = await worker.recognize(blob);
      var text = (result && result.data && result.data.text) || '';
      var parsed = parseText(text);
      if (!parsed.length) {
        setStatus(
          'Chưa đọc được bảng. Chụp rõ, đủ cột trọng số / Weight (vd 10.0 %).',
          'err'
        );
        setBar(null);
        btn.disabled = false;
        return;
      }
      rows = parsed;
      setBar(100);
      setStatus(
        'Xong — ' + scorable().length + ' thành phần. Chạm 「Nhập」 để gõ điểm.',
        'ok'
      );
      render();
      document.getElementById('panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (e) {
      console.error(e);
      // Fallback one-shot eng+vie nếu worker fail
      try {
        setStatus('Thử lại OCR…', 'wait');
        var result2 = await Tesseract.recognize(blob, OCR_LANG, {
          logger: function (m) {
            if (m.status === 'recognizing text' && m.progress != null) {
              setBar(40 + m.progress * 55);
            }
          },
        });
        var text2 = (result2 && result2.data && result2.data.text) || '';
        var parsed2 = parseText(text2);
        if (parsed2.length) {
          rows = parsed2;
          setBar(100);
          setStatus(
            'Xong — ' + scorable().length + ' thành phần. Chạm 「Nhập」 để gõ điểm.',
            'ok'
          );
          render();
          document.getElementById('panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          setStatus('Lỗi OCR / không nhận ra bảng. Thử ảnh khác.', 'err');
          setBar(null);
        }
      } catch (e2) {
        console.error(e2);
        setStatus('Lỗi OCR. Kiểm tra mạng rồi thử lại.', 'err');
        setBar(null);
      }
    }
    btn.disabled = false;
  }

  /* ---- wheel ----
   * Nguyên lý đúng:
   * - Dừng / snap = CSS scroll-snap (browser), KHÔNG tự smooth-scroll trong handler scroll
   * - Handler scroll chỉ cập nhật số preview
   * - Chỉ set scrollTop khi MỞ picker (instant), có cờ chặn loop
   */
  function buildCol(el, max) {
    var h = '<div class="pad"></div>';
    for (var i = 0; i <= max; i++) h += '<div class="it" data-v="' + i + '">' + i + '</div>';
    h += '<div class="pad"></div>';
    el.innerHTML = h;
  }

  /** Instant jump — never behavior:smooth here */
  function jumpTo(el, v) {
    var it = el.querySelector('.it[data-v="' + v + '"]');
    if (!it) return;
    var top = it.offsetTop - (el.clientHeight - it.clientHeight) / 2;
    wheelProgrammatic = true;
    el.scrollTop = top;
    // nhả cờ sau 1–2 frame (sau khi browser fire scroll event từ assignment)
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        wheelProgrammatic = false;
      });
    });
  }

  function readCol(el) {
    var items = el.querySelectorAll('.it');
    if (!items.length) return 0;
    var mid = el.scrollTop + el.clientHeight / 2;
    var best = 0;
    var dist = 1e9;
    for (var i = 0; i < items.length; i++) {
      var c = items[i].offsetTop + items[i].clientHeight / 2;
      var d = Math.abs(c - mid);
      if (d < dist) {
        dist = d;
        best = parseInt(items[i].getAttribute('data-v'), 10);
      }
    }
    return best;
  }

  function preview() {
    var i = readCol(document.getElementById('wInt'));
    var d = readCol(document.getElementById('wDec'));
    if (i >= 10) d = 0;
    var v = i >= 10 ? 10 : i + d / 10;
    document.getElementById('sheetBig').textContent = v.toFixed(1);
    // highlight item gần tâm
    highlightCol(document.getElementById('wInt'), i);
    highlightCol(document.getElementById('wDec'), d);
  }

  function highlightCol(el, active) {
    var items = el.querySelectorAll('.it');
    for (var i = 0; i < items.length; i++) {
      var v = parseInt(items[i].getAttribute('data-v'), 10);
      items[i].style.color = v === active ? '#0f172a' : '';
      items[i].style.fontSize = v === active ? '1.75rem' : '';
    }
  }

  function openPick(id) {
    var row = null;
    for (var i = 0; i < rows.length; i++) if (rows[i].id === id) row = rows[i];
    if (!row || row.isTotal) return;
    editId = id;
    document.getElementById('sheetSub').textContent =
      row.item + ' · ' + row.weight + '%';
    var wi = document.getElementById('wInt');
    var wd = document.getElementById('wDec');
    buildCol(wi, 10);
    buildCol(wd, 9);
    var v = row.value != null ? row.value : 0;
    var ip = Math.min(10, Math.floor(v + 1e-9));
    var dp = Math.round((v - ip) * 10);
    if (ip >= 10) {
      ip = 10;
      dp = 0;
    }
    document.getElementById('mask').classList.add('on');
    document.getElementById('sheet').classList.add('on');
    // đợi layout pad/item xong rồi nhảy tức thì
    requestAnimationFrame(function () {
      jumpTo(wi, ip);
      jumpTo(wd, dp);
      preview();
    });
  }

  function closePick() {
    document.getElementById('mask').classList.remove('on');
    document.getElementById('sheet').classList.remove('on');
    editId = null;
  }

  function apply(clear) {
    if (!editId) return;
    var row = null;
    for (var i = 0; i < rows.length; i++) if (rows[i].id === editId) row = rows[i];
    if (!row) return;
    if (clear) row.value = null;
    else {
      var iv = readCol(document.getElementById('wInt'));
      var dv = readCol(document.getElementById('wDec'));
      row.value = iv >= 10 ? 10 : clamp(iv + dv / 10);
    }
    closePick();
    render();
  }

  /* events — one button */
  document.getElementById('btnPick').addEventListener('click', function () {
    document.getElementById('file').click();
  });
  document.getElementById('file').addEventListener('change', function (e) {
    var f = e.target.files && e.target.files[0];
    e.target.value = '';
    if (f) runOcr(f);
  });
  document.getElementById('btnAgain').addEventListener('click', function () {
    document.getElementById('file').click();
  });
  document.getElementById('btnClear').addEventListener('click', function () {
    rows.forEach(function (r) {
      if (!r.isTotal) r.value = null;
    });
    render();
  });
  document.getElementById('list').addEventListener('click', function (e) {
    var b = e.target.closest('[data-id]');
    if (b) openPick(b.getAttribute('data-id'));
  });
  document.getElementById('mask').addEventListener('click', closePick);
  document.getElementById('btnOk').addEventListener('click', function () {
    apply(false);
  });
  document.getElementById('btnEmpty').addEventListener('click', function () {
    apply(true);
  });

  // Chỉ update preview — KHÔNG gọi scrollTo trong handler (tránh cuộn mãi không dừng)
  function bindScroll(el) {
    el.addEventListener(
      'scroll',
      function () {
        if (wheelProgrammatic) return;
        preview();
      },
      { passive: true }
    );
    // Khi browser snap xong (nếu hỗ trợ)
    el.addEventListener(
      'scrollend',
      function () {
        if (wheelProgrammatic) return;
        preview();
        // Khóa thập phân nếu nguyên = 10 (không animate)
        var wi = document.getElementById('wInt');
        if (el === wi && readCol(wi) >= 10) {
          var wd = document.getElementById('wDec');
          if (readCol(wd) !== 0) jumpTo(wd, 0);
        }
      },
      { passive: true }
    );
  }
  bindScroll(document.getElementById('wInt'));
  bindScroll(document.getElementById('wDec'));

  document.addEventListener('paste', function (e) {
    var items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.indexOf('image') === 0) {
        var f = items[i].getAsFile();
        if (f) {
          e.preventDefault();
          runOcr(f);
        }
        break;
      }
    }
  });
})();
  </script>
</body>
